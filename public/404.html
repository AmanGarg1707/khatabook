<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // Preserve full path under /khatabook so BrowserRouter basename works after redirect.
    var path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.redirect = path;
    window.location.replace('/khatabook/');
  </script>
</head>
</html>
